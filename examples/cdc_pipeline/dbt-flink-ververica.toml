[ververica]
gateway_url = "https://app.ververica.cloud"
# workspace_id = "your-workspace-id-here"
namespace = "default"
default_engine_version = "vera-4.0.0-flink-1.20"

[dbt]
project_dir = "."
target = "dev"

[deployment]
deployment_name = "cdc-pipeline"
parallelism = 1
restore_strategy = "LATEST_STATE"
upgrade_strategy = "STATEFUL"

# CDC connector JARs — adjust S3/GCS paths for your environment
additional_dependencies = [
    "s3://my-flink-jars/flink-sql-connector-mysql-cdc-3.0.0.jar",
    "s3://my-flink-jars/flink-sql-connector-postgres-cdc-3.0.0.jar",
]

[sql_processing]
strip_hints = true
generate_set_statements = true
include_drop_statements = true
