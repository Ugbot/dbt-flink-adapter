                    clusterId: null
                    cluster: null
                reserved-capacity:
                  description: Reserved Capacity workspace
                  value:
                    id: u6qci2cjybq2a6s2
                    creatorId: e967a977-6068-4355-99a9-bf387350b0dd
                    instanceId: u6qci2cjybq2a6s2
