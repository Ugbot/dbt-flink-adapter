          type: integer
          format: int32
        status:
          type: string
          enum:
            - NOT_STARTED
            - STARTING
            - RUNNING
            - CANCELLING
            - FAILED
            - CANCELLED
            - FINISHED
        totalCpu:
          type: number
          format: double
        totalMemoryByte:
          type: integer
          format: int64
        id:
          type: string
    GetDeploymentResponse:
      title: Get Deployment Response
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Deployment"
    Deployment:
      type: object
      properties:
        artifact:
          $ref: "#/components/schemas/Artifact"
        autopilot:
          $ref: "#/components/schemas/Autopilot"
        batchResourceSetting:
          $ref: "#/components/schemas/BatchResourceSetting"
        createdAt:
          type: integer
          format: int64
          description: Timestamp (Unix epoch) when the deployment was created.
          example: 1747727779
        creator:
          type: string
          description: Unique identifier of the user who created the deployment.
          example: e967a977-6068-4355-99a9-bf387350b0dd
        creatorName:
          type: string
          description: Display name of the deployment creator.
          example: John Doe
        deploymentHasChanged:
          type: boolean
          description: Flag indicating whether the deployment configuration has changed
            since the last deployment.
        deploymentId:
          type: string
          description: Unique identifier of the deployment.
          example: d23c27fc-0488-4adf-9f97-28d1175e5406
        deploymentTarget:
          $ref: "#/components/schemas/BriefDeploymentTarget"
        description:
          type: string
          description: Optional textual description of the deployment.
          example: ""
        engineVersion:
          type: string
          description: Version of the Flink engine used by this deployment.
          example: vera-1.0.3-flink-1.17
        executionMode:
          type: string
          description: Execution mode of the deployment; either streaming or batch.
          enum:
          - STREAMING
          - BATCH
        flinkConf:
          type: object
          additionalProperties:
            type: string
          description: Custom Flink configuration properties applied to the deployment.
          example:
            execution.checkpointing.interval: 180s
            restart-strategy: fixed-delay
            restart-strategy.fixed-delay.attempts: "2147483647"
            table.exec.state.ttl: 36 h
            execution.checkpointing.min-pause: 180s
            restart-strategy.fixed-delay.delay: 10 s
        jobSummary:
          $ref: "#/components/schemas/JobSummary"
        kerberosConfig:
          $ref: "#/components/schemas/DeploymentKerberosConfig"
        labels:
          type: object
          additionalProperties:
            type: string
          description: User-defined labels (key-value pairs) assigned to the deployment.
          example: {}
        localVariables:
          type: array
          description: List of local variables available to the deployment for parameterization.
          example: []
          items:
            $ref: "#/components/schemas/LocalVariable"
        logging:
          $ref: "#/components/schemas/LoggingV2"
        modifiedAt:
          type: integer
          format: int64
          description: Timestamp (Unix epoch) when the deployment was last modified.
          example: 1747989399
        modifier:
          type: string
          description: Unique identifier of the user who last modified the deployment.
          example: e967a977-6068-4355-99a9-bf387350b0dd
        modifierName:
          type: string
          description: Display name of the user who last modified the deployment.
          example: John Doe
        name:
          type: string
          description: "Must only contain symbols ^[a-zA-Z0-9_-]$, and no more than\
            \ 128 characters"
          example: jar-deployment
        namespace:
          type: string
          description: Kubernetes namespace or logical grouping where the deployment
            is created.
          example: default
        priority:
          type: integer
          format: int32
          description: "Priority level of the deployment, used for scheduling and\
            \ resource allocation. It's 5 by default"
          example: 5
        referencedDeploymentDraftId:
          type: string
          description: "Identifier of the deployment draft referenced by this deployment,\
            \ if any."
          example: ""
        resourceTuning:
          $ref: "#/components/schemas/ResourceTuning"
        streamingResourceSetting:
          $ref: "#/components/schemas/StreamingResourceSetting"
        taker:
          type: string
          description: Identifier or tag representing the entity currently holding
            or controlling the deployment.
          example: ' | vvp-0'
        workspace:
          type: string
          description: Workspace ID associated with the deployment.
          example: u6qci2cjybq2a6s2
      title: Deployment
    DeploymentKerberosConfig:
      type: object
      description: Kerberos authentication configuration for the deployment.
      example:
        kerberosEnabled: false
      properties:
        kerberosClusterName:
          type: string
        kerberosEnabled:
          type: boolean
        keytabPath:
          type: string
        krb5ConfPath:
          type: string
        principal:
          type: string
      title: DeploymentKerberosConfig
    DeploymentRestoreStrategy:
      type: object
      properties:
