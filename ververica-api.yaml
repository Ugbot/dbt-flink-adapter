    delete:
      tags:
      - workspaces
      summary: Delete user workspace
      description: |
        Deletes the specified workspace by its ID.
        This operation is irreversible — all associated resources, configurations, and stored data will be permanently removed.
      operationId: deleteWorkspace
      parameters:
      - name: workspace
        in: path
        description: Unique identifier of the workspace that groups related namespaces
          and resources.
        required: true
        schema:
          type: string
        example: ftt1fir2s7ev8e69
      responses:
        "204":
          description: Successfully removed
      security:
      - bearerAuth: []
    patch:
      tags:
      - workspaces
      summary: Update existing user workspace
      description: |
