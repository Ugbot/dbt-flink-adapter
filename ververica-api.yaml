    DeploymentTargetMetadata:
      type: object
      properties:
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Metadata key-value pairs. Includes creator & modifier info.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO-8601 format).
        deploymentTargetResourceName:
          type: string
          description: Internal resource name.
        deploymentTargetResourceType:
          type: string
          description: "Resource type RESOURCEQUEUE, DEFAULT, or UNKNOWN."
          enum:
          - RESOURCEQUEUE
          - DEFAULT
          - UNKNOWN
        id:
          type: string
          format: uuid
          description: UUID of the deployment target.
        isDefault:
          type: boolean
          description: |
            Indicates whether this is the default deployment target for the workspace.
            In Ververica Cloud, each workspace automatically uses a default deployment target
            whose ID is the same as the workspace ID.
        labels:
          type: object
          additionalProperties:
            type: string
          description: Key-value labels for the resource.
        modifiedAt:
          type: string
          format: date-time
          description: Last modification timestamp (ISO-8601 format).
        name:
          type: string
          description: Name of the deployment target.
        namespace:
          type: string
          description: Namespace in which the deployment target is registered.
        resourceVersion:
          type: integer
          format: int32
          description: Version number of the deployment target resource. Increments
            on change.
        workspace:
          type: string
          description: Workspace ID to which this deployment target belongs.
      title: DeploymentTargetMetadata
    DeploymentTargetSpec:
