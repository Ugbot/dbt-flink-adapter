                      regionId: null
                      computeUnits:
                        used: 0.0
                        total: 200
                      creationTime: 2025-05-16T05:40:15Z
                      deletionTime: null
                      consoleUri: https://app.dev.aws.ververica.cloud/console/#/workspaces/bz0x61je2i1qxhtv/
                      clusterId: e540c4cc-8750-470f-ac5d-0984639051c5
                      cluster:
                        id: e540c4cc-8750-470f-ac5d-0984639051c5
                        name: byoc-cluster
