    ClusterDetailedResponse:
      type: object
      description: Detailed information about a cluster managed via the Ververica
        Agent in the BYOC deployment model.
      example:
        id: e540c4cc-8750-470f-ac5d-0984639051c5
        instanceId: jbmvyabjfyichwpl
        name: byoc-cluster
        creationTime: 2025-04-14T08:45:43Z
        lastSeen: null
        status: ONLINE
        currentAgentVersion: 1.8.0
        mostRecentAgentVersion: 1.9.2
        helmValueContent: "pyxis-api-gateway:\n  tls:\n    caCertPem: \n    certPem:\
          \ \n    keyPem: \n    accessToken: eyJhbG6IkpX...eHRl03QG5NPQ\n  endpoint:\
          \ pyxis.aws.ververica.cloud\nglobal:\n  clusterId: jbmvyabjfyichwpl\n  clusterName:\
          \ jbmvyabjfyichwpl\n  imagePullSecretData: eyJWIzUkFZR...GRXYz0ifX19Cg==\n"
      properties:
        id:
          type: string
          description: Unique identifier of the cluster.
          example: 395cf992-1deb-4229-8991-71f0c7b1a06b
        instanceId:
          type: string
          description: Internal identifier of the cluster instance.
          example: jbmvyabjfyichwpl
        name:
          type: string
          description: Human-readable name of the cluster.
          example: My-cluster-name
          maxLength: 253
          minLength: 1
        creationTime:
          type: string
          description: Timestamp when the cluster was created (ISO 8601 format).
          example: 2024-08-21T11:36:44Z
        lastSeen:
          type: string
          description: Timestamp when the cluster last communicated with the Ververica
            Control Plane (ISO 8601 format). Currently it's always null.
          example: 2024-08-22T12:15:48Z
        status:
          type: string
          description: |
            Current status of the cluster:
            - `PENDING`: The cluster has been deployed but has not yet completed registration with the Control Plane.
            - `ONLINE`: The cluster is active and the agent is successfully communicating with the Control Plane.
            - `OFFLINE`: The cluster is registered but the agent is not currently communicating with the Control Plane.
          enum:
          - PENDING
          - ONLINE
          - OFFLINE
        currentAgentVersion:
          type: string
          description: The version of the Ververica Agent currently installed on the
            cluster. Will be null if the cluster is in `PENDING` status.
          example: 2.0.1
        mostRecentAgentVersion:
          type: string
          description: The latest available version of the Ververica Agent supported
            by the system.
          example: 2.1.2
        helmValueContent:
          type: string
          description: |
            Content of the Helm values file used during the agent's installation.
            This configuration defines how the Ververica Cluster (Agent) is deployed in the user's cloud environment.
            The agent establishes a one-way connection to the Ververica Control Plane, allowing Ververica to manage and monitor the cluster in the BYOC model.
          example: Helm file content
    CreateClusterRequest:
      type: object
      description: |
        Request body for creating a new BYOC Ververica Cluster (Agent).
        Creating a cluster through this endpoint does not deploy any resources.
        It registers metadata and generates a unique `instanceId` required to complete the Helm-based deployment.
      properties:
        name:
          type: string
          description: Human-readable name of the cluster.
          example: My-cluster-name
          maxLength: 253
          minLength: 1
      required:
      - name
    PartiallyUpdateClusterRequest:
      type: object
      description: |
        Request body for partially updating a Ververica Cluster (Agent).
        Currently supports renaming the cluster. The update does not affect the agent running in the user's cloud.
      properties:
        name:
          type: string
          description: |
            New name to assign to the cluster.
            This value is used only for identification purposes in the Ververica UI.
          example: new-cluster-name
          maxLength: 253
          minLength: 1
      required:
      - name
    ClusterListResponse:
      type: object
      description: List of clusters registered by the user in the BYOC deployment
        model.
      example:
        clusters:
        - id: e540c4cc-8750-470f-ac5d-0984639051c5
