openapi: 3.0.1
info:
  title: Ververica Platform API
  description: The Ververica Platform API
  contact:
    name: Ververica GmbH
    url: https://www.ververica.com
    email: platform@ververica.com
  license:
    name: Proprietary
  version: 1.1.19-cli
servers:
- url: https://app.ververica.cloud
  description: VVC
paths:
  /api/v1/auth/tokens:
    post:
      tags:
        - authorization
      summary: Generate user access token
      description: |
        This endpoint generates an access token for authenticating requests to the API.
        Clients must provide credentials, a social login token, or a refresh token
        depending on the selected authentication flow.

        The access token returned in the response should be included in the
        `Authorization` header as a Bearer token when calling protected endpoints.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              credentials:
                description: |
                  Login using classic username and password.
                  Typically used by users with registered accounts.
                value:
                  flow: credentials
                  username: user@company.com
                  password: SecurePa$$123
              social:
                description: |
                  Login using an OAuth2 social provider (e.g. Google).
                  The `externalAccessToken` must be obtained from the identity provider.
                  (Note: Currently, only `google` is supported.)
                value:
                  flow: social
                  provider: google
                  externalAccessToken: ya29.a0AfH6SMCOeXH1xL9EjQrJZ8eF3cVcD0AqL9n3OiPQ_ExampleTokenValue1234567890
              refresh:
                description: |
                  Refresh an existing session using a refresh token.
                  (Note: This flow is not implemented yet.)
                value:
                  flow: refresh
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiSm9obiBEb2UifQ.DjwRE2jZhren2Wt37t5hlVru6Myq4AhpGLiiefF69u8
      responses:
        "200":
          description: Successful login response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
    x-backend-url: /auth/tokens
  /api/v1/auth/passwordChangeRequests:
    post:
      tags:
      - authorization
      summary: Change user password
      description: |
        Change password for an authenticated user using the current (old) password.
        This flow is only available for users who authenticated using credentials authentication flow.
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPasswordChangeRequest"
      responses:
        "204":
          description: The password was changed successfully
      security:
      - bearerAuth: []
    x-backend-url: /auth/passwordChangeRequests
  /api/v1/auth/passwordResetRequests:
    post:
      tags:
      - authorization
      summary: Reset password
      description: |
        Initiates the password reset process for a user using the credentials authentication flow.
        The user must provide the email address associated with their account.
        If the email exists, a password reset link with an email token will be sent to the user via email.
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPasswordResetRequest"
      responses:
        "204":
          description: The password reset request was accepted. A reset message has
            been sent.
    x-backend-url: /auth/passwordResetRequests
  /api/v1/auth/passwordSetRequests:
    post:
      tags:
      - authorization
      summary: Set password within sign up and forget password flows
      description: |
        Sets a new password for a user as part of the sign-up or forgot password flows.

        This endpoint is typically called after the user clicks a link from an email,
        which includes a temporary token. The token must not be expired or invalid.
        Once the password is successfully set, the user's status becomes active.

        This flow applies only to users in the credentials authentication flow.
      operationId: setPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSetPasswordRequest"
      responses:
        "204":
          description: "The password was successfully set, and a confirmation email\
            \ was sent."
    x-backend-url: /auth/passwordSetRequests
  /api/v1/workspaces:
    get:
      tags:
      - workspaces
      summary: Get user workspaces
      description: |
        Returns a list of workspaces accessible to the authenticated user.

        This endpoint allows optional filtering by workspace status, permission,
        or specific instance IDs. It also supports disabling runtime enrichment
        to improve response times when such information is not required.
        The response includes all workspaces that are either owned by the user
        or explicitly shared with them.
        Useful for checking whether workspaces are ready (status `OK`) or still being provisioned (status `PROCESSING`).
      operationId: findWorkspaces
      parameters:
      - name: instanceId
        in: query
        description: |
          A list of workspace IDs to return.
          If no workspace IDs are provided, all workspaces shared with the user are returned.
        required: false
        schema:
          type: array
          items:
            type: string
      - name: statusCategory
        in: query
        description: |
          A list of workspace statuses to filter the list of workspaces to return.
          If no workspace statuses are provided, all workspaces are returned.
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - OK
            - PROCESSING
            - ERROR
            - UNKNOWN
      - name: features
        in: query
        description: Optional list of workspace features to enrich the response
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - RUNTIME_INFO
            - AZURE_CREDENTIAL_INFO
          uniqueItems: true
      - name: permission
        in: query
        description: |
          A permission code to filter the list of workspaces to return.
          If provided, this can be used for example to return only the workspaces
          where the user is an admin.
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Response with user workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceList"
              examples:
                vvc-payment-system-user:
                  description: PAYG and RC workspaces using Ververica AWS & Azure
                    clusters
                  value:
                    workspaces:
                    - id: wtlcg3n9ldy8mk0e
                      name: Pay as you go Azure workspace
                      creatorId: e967a977-6068-4355-99a9-bf387350b0dd
                      instanceId: wtlcg3n9ldy8mk0e
                      status:
                        name: Creating
                        category: PROCESSING
                      userRoleId: owner
                      billingPlanId: 8
                      offeringType: PAYG
                      regionId: azure-dev-gwc
                      computeUnits:
                        used: 0.0
                        total: 50
                      creationTime: 2025-05-15T17:49:51Z
                      deletionTime: null
                      consoleUri: https://app.dev.aws.ververica.cloud/console/#/workspaces/wtlcg3n9ldy8mk0e/
                      clusterId: null
                      cluster: null
                    - id: q7760t0ym1d7xyso
                      creatorId: e967a977-6068-4355-99a9-bf387350b0dd
                      instanceId: q7760t0ym1d7xyso
                      name: Pay as you go AWS workspace
                      status:
                        name: Running
