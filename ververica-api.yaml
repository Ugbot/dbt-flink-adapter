          resources.
        required: true
        schema:
          type: string
        example: default
      requestBody:
        description: deploymentTarget
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentTarget"
          application/x-protobuf:
            schema:
              $ref: "#/components/schemas/DeploymentTarget"
          application/yaml:
