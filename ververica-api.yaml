          type: integer
          format: int32
          example: 4
      title: BatchResourceSetting
    BriefDeploymentTarget:
      type: object
      properties:
        mode:
          type: string
          description: |
            Deployment mode:
            - `SESSION`: selects an existing session cluster where the deployment will be deployed.
            - `PER_JOB`: does not use a session cluster; the deployment runs as a standalone job.
          enum:
          - PER_JOB
          - SESSION
        name:
          type: string
          description: |
            The name of the deployment target identifying the target cluster or job.
            For `SESSION` mode, this is the cluster name of the session cluster.
            For `PER_JOB` mode, this is equal to the workspace ID.
      title: BriefDeploymentTarget
    DeploymentResponse:
      $ref: "#/components/schemas/Deployment"
    ListDeploymentsResponse:
      title: ListDeploymentsResponse
      type: object
      properties:
        deployments:
          type: array
          items:
            $ref: "#/components/schemas/StreamDeployment"
    ListDeploymentsResponseTemporary:
      title: DeploymentList
