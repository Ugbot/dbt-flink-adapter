            parallel tasks will be run concurrently.
          example: 2
        taskmanagerResourceSettingSpec:
          $ref: "#/components/schemas/BasicResourceSettingSpec"
      title: BasicResourceSetting
    BasicResourceSettingSpec:
      type: object
      description: Specification of resources allocated for the component including
        CPU and memory settings.
      properties:
        cpu:
          type: number
          format: double
          description: Number of CPU cores allocated to the component.
          example: 1.0
        memory:
          type: string
          description: "Amount of memory allocated to the component, specified with\
            \ units."
          example: 2Gi
      title: BasicResourceSettingSpec
    BatchResourceSetting:
      type: object
