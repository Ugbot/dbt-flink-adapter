                      regionId: aws-eu-west-1
                      computeUnits:
                        used: 0.0
                        total: 50
                      creationTime: 2025-04-28T13:02:15Z
                      deletionTime: null
                      consoleUri: https://app.dev.aws.ververica.cloud/console/#/workspaces/q7760t0ym1d7xyso/
                      clusterId: null
                      cluster: null
                    - id: u6qci2cjybq2a6s2
                      creatorId: e967a977-6068-4355-99a9-bf387350b0dd
                      instanceId: u6qci2cjybq2a6s2
                      name: Reserved capacity AWS workspace
                      status:
                        name: Creating
                        category: PROCESSING
                      userRoleId: owner
                      billingPlanId: 11
                      offeringType: RC
                      regionId: aws-eu-west-1
                      computeUnits:
                        used: 0.0
                        total: 10
                      creationTime: 2025-05-15T17:50:13Z
                      deletionTime: null
                      consoleUri: https://app.dev.aws.ververica.cloud/console/#/workspaces/u6qci2cjybq2a6s2/
                      clusterId: null
                      cluster: null
                aws-marketplace-user:
                  description: BYOC workspaces
                  value:
                    workspaces:
                    - id: bz0x61je2i1qxhtv
                      creatorId: db15f705-b498-4a15-b2d0-7c6e2a13aabf
                      instanceId: bz0x61je2i1qxhtv
                      name: Bring your own cloud workspace
                      status:
                        name: New
                        category: PROCESSING
                      userRoleId: owner
                      billingPlanId: 9
