                        currentAgentVersion: 1.9.2
                        mostRecentAgentVersion: 1.9.2
      security:
      - bearerAuth: []
    post:
      tags:
      - workspaces
      summary: Create user workspace
      description: "Creates a new workspace for the authenticated user based on the\
        \ provided configuration.\nThe workspace is created asynchronously — after\
        \ the request is accepted, the workspace will be in a PROCESSING state \n\
        You must wait until the workspace reaches an OK state before it can be accessed\
        \ and used.\n\nThe `billingPlanId` is required to create the workspace and\
        \ determines the offering type and available resources.  \nTo retrieve the\
        \ list of available billing plans and their corresponding identifiers, use\
        \ the **Billing Plans API**.\n\nFor workspaces using the **Bring Your Own\
        \ Cloud (BYOC)** offering type, the following additional fields are required:\n\
        - `clusterId`: ID of the pre-provisioned BYOC cluster.\n- `data.storage`:\
        \ Object defining the BYOC storage configuration.\nTo retrieve the list of\
        \ available BYOC clusters and their IDs, use the **Clusters API**.\n"
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceCreationRequest"
            examples:
              pay-as-you-go:
                description: |
                  Creates a new workspace with the PAYG offering type.
                value:
                  name: Pay-as-you-go-workspace
                  billingPlanId: "8"
              reserved-capacity:
                description: |
                  Creates a new workspace with the RC offering type.
                value:
                  name: Reserved-capacity-workspace
                  billingPlanId: "11"
              bring-your-own-cloud:
                description: |
                  Creates a new workspace with the BYOC offering type.
                value:
                  name: Bring-your-own-cloud-workspace
                  billingPlanId: "9"
                  clusterId: e540c4cc-8750-470f-ac5d-0984639051c5
                  data:
                    storage:
                      id: s3://my-byoc-bucket
                      type: s3
        required: true
      responses:
        "201":
          description: User workspace created
      security:
      - bearerAuth: []
    x-backend-url: /product/workspaces
  /api/v1/workspaces/{workspace}:
    get:
      tags:
      - workspaces
      summary: Get single user workspace
      description: "Retrieves the workspace identified by its ID. \nThe response contains\
        \ the current configuration and status of the workspace, including offering\
        \ type, billing details, and deployment-specific metadata.  \nUseful for checking\
        \ whether the workspace is ready (status `OK`) or still being provisioned\
        \ (status `PROCESSING`).\n"
      operationId: getWorkspace
      parameters:
      - name: workspace
        in: path
        description: Unique identifier of the workspace that groups related namespaces
          and resources.
        required: true
        schema:
          type: string
        example: ftt1fir2s7ev8e69
      - name: features
        in: query
        description: Optional list of workspace features to enrich the response
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - RUNTIME_INFO
            - AZURE_CREDENTIAL_INFO
          uniqueItems: true
      responses:
        "200":
          description: Response with created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
              examples:
                pay-as-you-go:
                  description: Pay as you go workspace
                  value:
                    id: ftt1fir2s7ev8e69
                    creatorId: e967a977-6068-4355-99a9-bf387350b0dd
                    instanceId: ftt1fir2s7ev8e69
