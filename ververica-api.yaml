  /api/v1/namespaces/{namespace}/deployment-targets:
    get:
      tags:
      - deployment-targets
      summary: List all deployment targets
      description: "Returns a list of all deployment targets within the given namespace.\
        \ \nDeployment targets define runtime environments for deploying Flink jobs.\n"
      operationId: getDeploymentTargets
      parameters:
      - name: workspace
        in: header
        description: Unique identifier of the workspace that groups related namespaces
          and resources.
        required: true
        schema:
          type: string
        example: u6qci2cjybq2a6s2
      - name: namespace
        in: path
        description: Logical namespace within the workspace used to organize and isolate
          resources.
        required: true
        schema:
          type: string
        example: default
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceListOfDeploymentTarget"
            application/x-protobuf:
              schema:
                $ref: "#/components/schemas/ResourceListOfDeploymentTarget"
            application/yaml:
              schema:
                $ref: "#/components/schemas/ResourceListOfDeploymentTarget"
      security:
      - bearerAuth: []
