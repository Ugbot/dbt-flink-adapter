        in: path
        description: Unique identifier of the workspace that groups related namespaces
          and resources.
        required: true
        schema:
          type: string
        example: u6qci2cjybq2a6s2
      - name: alarmId
        in: query
        description: alarmId
        schema:
          type: string
      - name: deploymentId
        in: path
        description: Unique identifier of the deployment resource.
        required: true
        schema:
          type: string
      - name: endTime
        in: query
        description: endTime
        required: true
        schema:
          type: integer
          format: int64
      - name: namespace
        in: path
        description: Logical namespace within the workspace used to organize and isolate
          resources.
