          type: boolean
        jobStartTimeInMs:
          type: integer
          format: int64
        kind:
          type: string
          enum:
          - NONE
          - LATEST_SAVEPOINT
          - FROM_SAVEPOINT
          - LATEST_STATE
        savepointId:
          type: string
          format: uuid
      title: DeploymentRestoreStrategy
    DeploymentTarget:
      type: object
      example:
        kind: DeploymentTarget
        apiVersion: v1
        metadata:
          id: 930bd09f-2cbe-4b8f-9b00-0abfa7db7b87
          name: u6qci2cjybq2a6s2
          namespace: default
          createdAt: 2025-05-15T17:54:41Z
          modifiedAt: 2025-05-15T17:54:41Z
          labels: {}
          workspace: u6qci2cjybq2a6s2
          deploymentTargetResourceType: DEFAULT
          annotations:
            creator: e967a977-6068-4355-99a9-bf387350b0dd
            modifier: e967a977-6068-4355-99a9-bf387350b0dd
          resourceVersion: 1
          isDefault: false
        spec:
          kubernetes:
            namespace: u6qci2cjybq2a6s2
            clusterName: u6qci2cjybq2a6s2
          state: ONLINE
          kind: kubernetes
