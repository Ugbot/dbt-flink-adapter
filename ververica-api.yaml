              properties:
                statement:
                  type: string
                  description: The SQL script content to validate.
                  example: |
                    CREATE TABLE source_table (
                      id INT,
                      name STRING
                    ) WITH (
                      'connector' = 'kafka',
                      'topic' = 'input_topic',
                      'properties.bootstrap.servers' = 'localhost:9092',
                      'format' = 'json'
                    );
                versionName:
                  type: string
                  description: The engine argument, defaults to recommended engine version.
                  example: "vera-4.1-cc-flink-1.20"
                batchMode:
                  type: boolean
                  description: Indicates if the script is intended for batch processing.
                  example: false
                lightValidateType:
                  type: string
                  example: DRAFT
              required:
                - sqlScript
      responses:
        "200":
          description: SQL script is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  validationResult:
                    type: string
                    description: Result of the validation
                    example: VALIDATION_RESULT_VALID_DDL_STATEMENT
                    enum:
                      - VALIDATION_RESULT_VALID_DDL_STATEMENT
                      - VALIDATION_RESULT_VALID_INSERT_QUERY
                      - VALIDATION_RESULT_INVALID
                      - VALIDATION_RESULT_VALID_SELECT_QUERY
                      - VALIDATION_RESULT_VALID_COMMAND_STATEMENT
                      - VALIDATION_RESULT_VALID_MT_DDL_STATEMENT
                      - VALIDATION_RESULT_VALID_GENERIC_DRAFT
                      - VALIDATION_RESULT_VALID_SO_FAR
                      - VALIDATION_RESULT_VALID
                  isRecoverable:
                    type: boolean
                    example: true
                  errorDetails:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          description: Error message
                          example: Syntax error near 'FROM'
                        lineNumber:
                          type: integer
                          description: Line number of the error
                          example: 11
                        endLineNumber:
                          type: integer
                          description: End line number of the error
                          example: 11
                        columnNumber:
                          type: integer
                          description: Column number of the error
                          example: 30
                        endColumnNumber:
                          type: integer
                          description: End column number of the error
                          example: 30
      security:
      - bearerAuth: []
  /api/v1/namespaces/{namespace}/deployment-drafts:deploy:
    post:
      tags:
        - deployment-drafts
      summary: Deploy a deployment draft
      description: |
        Deploys a deployment draft by submitting its full specification.
        The draft property must match the structure returned by the GET deployment draft endpoint.
      operationId: deployDeploymentDraft
      parameters:
        - name: workspace
          in: header
          description: Unique identifier of the workspace that groups related namespaces
            and resources.
          required: true
          schema:
            type: string
          example: u6qci2cjybq2a6s2
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Namespace in which the deployment draft resides.
          example: default
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                draft:
                  $ref: "#/components/schemas/DeploymentDraft"
                conf:
                  type: object
                  description: Optional configuration overrides.
                deploymentTargetInfo:
                  type: object
                  properties:
                    deploymentTargetId:
                      type: string
                      format: uuid
                  required:
                    - deploymentTargetId
                skipValidate:
                  type: boolean
                  description: If true, skips validation before deployment.
              required:
                - draft
      responses:
        "200":
          description: Deployment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  commitResult:
                    type: object
                    properties:
                      success:
                        type: boolean
                      deployment:
                        $ref: "#/components/schemas/DeploymentDraft"
                  validationResult:
                    type: object
                    properties:
                      planValidation:
                        type: object
                        properties:
                          message:
                            type: string
                          success:
                            type: boolean
                      kind:
                        $ref: '#/components/schemas/ArtifactKind'
                      success:
                        type: boolean
        "400":
          description: Invalid request payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      security:
        - bearerAuth: []
components:
  schemas:
    WorkspaceCreationRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the workspace
          maxLength: 253
          minLength: 1
          pattern: "[a-zA-Z0-9_-]+"
        billingPlanId:
          type: integer
          format: int64
          description: "Determines offering type, offering, and region"
        clusterId:
          type: string
          format: uuid
          example: 395cf992-1deb-4229-8991-71f0c7b1a06b
        data:
          $ref: "#/components/schemas/WorkspaceMetadata"
      required:
      - name
    WorkspaceMetadata:
      type: object
      description: Workspace metadata
      properties:
        storage:
          $ref: "#/components/schemas/WorkspaceStorageMetadata"
    WorkspaceStorageMetadata:
      type: object
      description: Workspace storage metadata
      properties:
        type:
          type: string
        id:
          type: string
    UserSetPasswordRequest:
      type: object
      description: |
        Payload used to set a new password during account activation or password reset.
        The token must be obtained from a link sent via email and must not be expired.
      example:
        token: EP9R3y8AYaAkX_OIQfMMMeZISySKk3lKHE5bp0P5oyScYoZRH8u69mRtFFz4uDBevDEIybC4L1jJ5PKYcA92XQ
        password: newPassword123!
      properties:
        token:
          type: string
          description: "One-time token from the email link, used to authenticate the\
            \ password change request."
        password:
          type: string
          description: |
            The new password to be set. It must be between 12 and 128 characters long,
            and contain at least one lowercase letter, one uppercase letter, one digit,
            and one special character.
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[!\\\"#$%&''()*+,-./:;<=>?@[\\\
            \\]^_`{|}~\\u005B\\u005D])[A-Za-z\\d!\\\"#$%&''()*+,-./:;<=>?@[\\\\]^_`{|}~\\\
            u005B\\u005D]{12,128}$"
      required:
      - password
      - token
    UserPasswordResetRequest:
      type: object
      description: User password reset request
      example:
        email: user@company.com
      properties:
        email:
          type: string
          description: The email address associated with the user's account.
      required:
      - email
    UserPasswordChangeRequest:
      type: object
      description: User password change request
      example:
        oldPassword: oldPassword123!
        newPassword: newPassword123!
      properties:
        oldPassword:
          type: string
          description: The user's current password. It is required to authenticate
            the password change.
        newPassword:
          type: string
          description: |
            The new password to be set. Must be between 12 and 128 characters long, and include at least one lowercase letter, one uppercase letter, one digit, and one special character.
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[!\\\"#$%&''()*+,-./:;<=>?@[\\\
            \\]^_`{|}~\\u005B\\u005D])[A-Za-z\\d!\\\"#$%&''()*+,-./:;<=>?@[\\\\]^_`{|}~\\\
            u005B\\u005D]{12,128}$"
      required:
      - newPassword
      - oldPassword
    WorkspaceUpdateRequest:
      type: object
      description: "Number of Compute Units (CUs) to allocate for the workspace.\n\
        Each Compute Unit corresponds to a fixed amount of physical resources, based\
        \ on the following formula:\n\n**1 CU = 1 vCPU core + 4 GiB RAM**\n\nThe value\
        \ must be greater than 0.  \nFor example:\n  - `1.0` CU = 1 core, 4 GiB RAM\
        \  \n  - `4.0` CU = 4 cores, 16 GiB RAM\n"
      properties:
        computeUnits:
          type: number
          example: 10
          minimum: 0
      required:
      - computeUnits
    UserProfileUpdateRequest:
      type: object
      description: Request payload to partially update a user's profile information.
        Only the provided fields will be updated.
      properties:
        firstName:
          type: string
          description: The user's first name.
          example: John
          maxLength: 128
          minLength: 1
        lastName:
          type: string
          description: The user's last name.
          example: Doe
          maxLength: 128
          minLength: 1
        fullName:
          type: string
          description: "The user's full name, used for display purposes."
          example: John Doe
          maxLength: 256
          minLength: 1
        marketingConsentAcceptance:
          type: boolean
          description: Indicates whether the user has accepted marketing communications.
          example: true
    Cluster:
      type: object
      description: Cluster details
      properties:
        id:
          type: string
          example: 395cf992-1deb-4229-8991-71f0c7b1a06b
        name:
          type: string
          example: My-cluster-name
          maxLength: 253
          minLength: 1
        creationTime:
          type: string
          description: ISO8601 datetime
          example: 2024-08-21T11:36:44Z
        lastSeen:
          type: string
          description: ISO8601 datetime
          example: 2024-08-22T12:15:48Z
        status:
          type: string
          enum:
          - PENDING
          - ONLINE
          - OFFLINE
        currentAgentVersion:
          type: string
          description: The version of the installed chart. Will be null on PENDING
            cluster
          example: 2.0.1
        mostRecentAgentVersion:
          type: string
          description: Most recent version of chart
          example: 2.1.2
    ComputeUnits:
      type: object
      description: "Number of Compute Units (CUs) to allocate for the workspace.\n\
        Each Compute Unit corresponds to a fixed amount of physical resources, based\
        \ on the following formula:\n\n**1 CU = 1 vCPU core + 4 GiB RAM**\nFor example:\n\
        \  - `1.0` CU = 1 core, 4 GiB RAM  \n  - `4.0` CU = 4 cores, 16 GiB RAM\n"
      properties:
        used:
          type: number
          description: |
            Number of Compute Units, indicating how much of the allocated resources are already consumed.
          example: 2.0
        total:
          type: number
          description: |
            Total number of Compute Units allocated to the workspace.
            Represents the resource limit available for deployments.
          example: 10.0
    Workspace:
      type: object
      description: |
        A workspace is an isolated environment for deploying and managing applications,
        typically scoped to a specific user, team, or project. Workspaces are associated
        with a cloud region, a billing plan, and a compute cluster.
      properties:
        id:
          type: string
          description: Unique identifier of the workspace.
          example: q7760t0ym1d7xyso
        creatorId:
          type: string
          description: UUID of the user who created the workspace.
          example: e967a977-6068-4355-99a9-bf387350b0dd
        instanceId:
          type: string
          description: Workspace instance ID.
          example: q7760t0ym1d7xyso
        name:
          type: string
          description: "Human-readable name of the workspace. Only letters, numbers,\
            \ dashes (“-”), and underscores (“_”) are allowed."
          example: workspace-name
        status:
          $ref: "#/components/schemas/WorkspaceStatus"
        userRoleId:
          type: string
          description: |
            Role of the current user in the workspace.
            Possible values:
              - `admin`
              - `owner`
              - `editor`
              - `viewer`
          example: owner
        billingPlanId:
          type: integer
          format: int64
          description: Identifier of the billing plan assigned to this workspace.
          example: 10
        offeringType:
          type: string
          description: |
            Type of offering associated with the workspace.
            - `PAYG`: Pay-as-you-go model.
            - `RC`: Reserved capacity model.
            - `BYOC`: Bring your own cloud infrastructure.
          enum:
          - PAYG
          - RC
          - BYOC
          example: PAYG
        regionId:
          type: string
          description: Identifier of the cloud region where the workspace is deployed.
          example: aws-eu-west-1
        computeUnits:
          $ref: "#/components/schemas/ComputeUnits"
        creationTime:
          type: string
          description: ISO-8601 timestamp of when the workspace was created.
          example: 2025-04-28T13:02:15Z
        deletionTime:
          type: string
          description: "ISO-8601 timestamp of when the workspace was deleted, or null\
            \ if still active."
        consoleUri:
          type: string
          description: Direct link to the workspace view in the Ververica console.
          example: https://app.dev.aws.ververica.cloud/console/#/workspaces/q7760t0ym1d7xyso/
        clusterId:
          type: string
          format: uuid
          description: UUID of the cluster the workspace is assigned to.
          example: 395cf992-1deb-4229-8991-71f0c7b1a06b
        cluster:
          $ref: "#/components/schemas/Cluster"
        azureCredentials:
          $ref: "#/components/schemas/AzureCredentials"
        cloudProvider:
          type: string
          enum:
          - AWS
          - AZURE
          - BYOC
    WorkspaceStatus:
      type: object
      description: |
        Workspace status.
        When a workspace is being created, its status is in the PROCESSING category (name: "Creating").
        Once the workspace is ready and usable, the status changes to the OK category (name: "Running").
        Only when the category is OK can the user enter and interact with the workspace.
      properties:
        name:
          type: string
          example: Running
        category:
          type: string
          enum:
          - OK
          - PROCESSING
          - ERROR
          - UNKNOWN
    WorkspaceList:
      type: object
      description: List of workspaces
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
    ArtifactKind:
      type: string
      enum:
        - SQLSCRIPT
        - JAR
        - PYTHON
    Artifact:
      type: object
      description: |
        Represents a single file stored in the artifact store for a given workspace and namespace.
        Artifacts can be JARs, Python scripts, SQL scripts, CDC definitions, or other supported formats.
        They are used in deployments or data processing configurations and are uploaded separately via presigned URLs.
        Each artifact contains metadata including upload time, uploader identity, storage location (URI), and logical classification (`kind`).
      example:
        kind: JAR
        jarArtifact:
          jarUri: https://example.com/artifacts/my-job.jar
          entryClass: org.example.Main
      properties:
        content:
          type: string
        createTime:
          type: string
          format: date-time
          description: Timestamp when the artifact was uploaded.
          example: 2025-05-20T10:07:49Z
        filename:
          type: string
          description: Name of the file (excluding the path).
          example: FlinkQuickStart-1.0-SNAPSHOT.jar
        namespace:
          type: string
          description: Namespace the artifact belongs to.
          example: ""
        size:
          type: string
          description: Size of the file in bytes.
          example: "0"
        uploader:
          type: string
          description: Identity of the uploader.
          example: ""
        uri:
          type: string
          description: |
            Full URI to access the artifact from within the system or deployment definition.
            This is typically in the form of:
            - `s3i://...` for AWS S3
            - `abfss://...` for Azure
            example: "s3i://vvc-tenant-u6qci2cabsd2a6s2-eu-west-1/artifacts/namespaces/default/FlinkQuickStart-1.0-SNAPSHOT.jar"
        kind:
          type: string
          description: Logical type of the artifact.
          enum:
          - SQLSCRIPT
          - CDCYAML
          - JAR
          - PYTHON
          - MATERIALIZED_TABLE
          - UNKNOWN
        jarArtifact:
          $ref: "#/components/schemas/JarArtifact"
        pythonArtifact:
          $ref: "#/components/schemas/PythonArtifact"
        sqlArtifact:
          $ref: "#/components/schemas/SqlArtifact"
        cdcYamlArtifact:
          $ref: "#/components/schemas/CdcYamlArtifact"
        materializedTableArtifact:
          $ref: "#/components/schemas/MaterializedTableArtifact"
      title: Artifact
    ByteString:
      type: object
      properties:
        empty:
          type: boolean
        validUtf8:
          type: boolean
      title: ByteString
    DeleteArtifactResponse:
      type: object
      description: Empty response indicating successful deletion
      title: DeleteArtifactResponse
    Event:
      type: object
      properties:
        alarmRuleName:
          type: string
        message:
          type: string
        occurTime:
          type: integer
          format: int64
      title: Event
    GetArtifactMetadataResponseTemporary:
      title: GetArtifactMetadataResponse
      type: object
      properties:
        data:
          type: object
          properties:
            "@type":
              type: string
            artifact:
              $ref: "#/components/schemas/Artifact"
    GetArtifactMetadataResponse:
      type: object
      example:
        artifact:
          filename: Shakespeare
          content: ""
          namespace: ""
          uploader: ""
          createTime: 2025-05-20T11:30:48Z
          uri: s3i://vvc-tenant-u6qci2cjabc2a6s2-eu-west-1/artifacts/namespaces/default/Shakespeare
          size: "94275"
      properties:
        artifact:
          $ref: "#/components/schemas/Artifact"
      title: GetArtifactMetadataResponse
    ListArtifactsResponse:
      type: object
      example:
        artifacts:
        - filename: FlinkQuickStart-1.0-SNAPSHOT.jar
          content: ""
          namespace: ""
          uploader: ""
          createTime: 2025-05-20T10:07:49Z
          uri: s3i://vvc-tenant-u6qci2cabss2a6s2-eu-west-1/artifacts/namespaces/default/FlinkQuickStart-1.0-SNAPSHOT.jar
          size: "0"
        - filename: Shakespeare
          content: ""
          namespace: ""
          uploader: ""
          createTime: 2025-05-20T10:04:43Z
          uri: s3i://vvc-tenant-u6qci2cabss2a6s2-eu-west-1/artifacts/namespaces/default/Shakespeare
          size: "0"
        - filename: word_count_streaming.py
          content: ""
          namespace: ""
          uploader: ""
          createTime: 2025-05-20T09:57:48Z
          uri: s3i://vvc-tenant-u6qci2cabss2a6s2-eu-west-1/artifacts/namespaces/default/word_count_streaming.py
          size: "0"
      properties:
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
      title: ListArtifactsResponse
    MetadataBody:
      type: object
      properties:
        filename:
          type: string
        jarUrl:
          type: string
      title: MetadataBody
    SaveArtifactMetadataResponse:
      type: object
      properties:
        artifact:
          $ref: "#/components/schemas/Artifact"
      title: SaveArtifactMetadataResponse
    SignatureResponseTemporary:
      title: SignatureResponse
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Signature"
    Signature:
      type: object
      description: "Contains metadata and credentials used to upload or download an\
        \ artifact (e.g. a JAR file) \nto and from a cloud-based object storage.\n\
        This object is returned when requesting a signature for an artifact upload.\
        \ It includes storage-specific \ninformation such as pre-signed URLs or temporary\
        \ security credentials, depending on the underlying backend.\n\nSupported\
        \ storage backends include:\n- **AWS S3** (`kind: s3i`) – uses pre-signed\
        \ URLs for PUT and GET operations\n- **Azure Data Lake Storage Gen2** (`kind:\
        \ abfss`) – uses pre-signed (SAS) URLs for PUT and GET operations\n"
      properties:
        accessKeyId:
          type: string
          description: Temporary access key used for uploads in OSS-based storage.
            Not used for S3 or Azure.
        artifactPath:
          type: string
          description: |
            Logical object path in the internal storage, used by the deployment system to locate artifacts.
            This is not necessarily a directly accessible URL.
        endpoint:
          type: string
          description: "Endpoint of the object storage service (e.g., for OSS). Typically\
            \ null for managed S3 or Azure storage."
        filePath:
          type: string
          description: Internal file path used in certain OSS configurations. Unused
            for S3 and Azure.
        kind:
          type: string
          description: "Identifier of the object storage type, such as:\n- `s3i` (AWS\
            \ S3), \n- `abfss` (Azure Blob/File System).\n"
        policy:
          type: string
          description: Upload policy definition (mainly used in OSS scenarios). Not
            applicable to S3 or Azure.
        presignedUrlForGet:
          type: string
        presignedUrlForPut:
          type: string
        securityToken:
          type: string
          description: Optional temporary security token. Not used for S3 or Azure.
        signature:
          type: string
          description: |
            Optional request signature for OSS-based uploads.
            Not applicable to S3 or Azure.
      title: Signature
    URL:
      title: URL
      type: object
      properties:
        authority:
          type: string
        content:
          type: object
          properties: {}
        defaultPort:
          type: integer
          format: int32
        file:
          type: string
        host:
          type: string
        path:
          type: string
        port:
          type: integer
          format: int32
        protocol:
          type: string
        query:
          type: string
        ref:
          type: string
        userInfo:
          type: string
    LoginRequest:
      type: object
      description: Log in request
      properties:
        flow:
          type: string
          description: |
            Identifies the type of login request.
            - `credentials`: Login with user email and password.
            - `social`: Login with Google email account.
            - `refresh`: Obtain a new token using the refresh token from a previous login request.
          enum:
          - credentials
          - social
          - refresh
        username:
          type: string
          description: |
            The username, when flow=="credentials"
        password:
          type: string
          description: |
            The password, when flow=="credentials"
        provider:
          type: string
          description: |
            Identity provider name, when flow=="social"
          enum:
          - google
          - github
        externalAccessToken:
          type: string
          description: |
            Access token of external identity provider, when flow=="social"
        refreshToken:
          type: string
          description: |
            Refresh token, when flow=="refresh"
      required:
      - flow
    LoginResponse:
      type: object
      description: Response containing access token and refresh token with metadata
      example:
        accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiSm9obiBEb2UifQ.DjwRE2jZhren2Wt37t5hlVru6Myq4AhpGLiiefF69u8
        expiresIn: 3599
        refreshExpiresIn: 3599
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiSm9obiBEb2UifQ.DjwRE2jZhren2Wt37t5hlVru6Myq4AhpGLiiefF69u8
        tokenType: Bearer
      properties:
        accessToken:
          type: string
          description: The access token issued to the user. This token is used as
            a bearer token to authenticate subsequent API requests.
        refreshToken:
          type: string
          description: The refresh token issued to the user. This token is used to
            obtain a new access token when the current one expires.
        tokenType:
          type: string
          description: The type of the token. Currently it's fixed and always set
            to "Bearer".
        expiresIn:
          type: integer
          format: int64
          description: The duration (in seconds) for which the access token is valid.
        refreshExpiresIn:
          type: integer
          format: int64
          description: The duration (in seconds) for which the refresh token is valid.
    SignUpFormRequest:
      type: object
      description: User profile creation request
      properties:
        flow:
          type: string
          description: |
            Registration flow type:
            - `form`: Traditional form-based sign-up.
            - `social`: Sign-up via an external identity provider (OAuth).
          enum:
          - form
          - social
        companyName:
          type: string
          description: Name of the company the user represents.
        countryId:
          type: string
          description: ISO 3166-1 alpha-3 country code
        requiredConsentAcceptance:
          type: boolean
          description: Indicates whether the user has accepted required terms and
            policies.
        marketingConsentAcceptance:
          type: boolean
          description: Indicates whether the user agrees to receive marketing communication.
        firstName:
          type: string
          description: User's first name (relevant for form-based flow).
        lastName:
          type: string
          description: User's last name (relevant for form-based flow).
        email:
          type: string
          description: User's email address.
        provider:
          type: string
          description: OAuth provider used in the `social` registration flow. Required
            only when `flow` is set to `social`.
          enum:
          - google
          - github
        externalAccessToken:
          type: string
          description: |
            OAuth access token used for social login.
            Required when `flow` is `social`.
          maxLength: 4096
          minLength: 1
        fullName:
          type: string
          description: User's full name (relevant for `social` flow)
      required:
      - companyName
      - countryId
      - flow
      - marketingConsentAcceptance
      - requiredConsentAcceptance
    UserProfile:
      type: object
      description: Created user profile information
      properties:
        id:
          type: string
          description: Unique identifier of the user.
          example: 9462f9a8-2b3d-45e7-9162-b5f6cd9b973b
        email:
          type: string
          description: User's email address.
          example: useremail@company.com
        status:
          $ref: "#/components/schemas/UserProfileStatus"
        createdDate:
          type: string
          description: Timestamp of user creation in ISO8601 format.
          example: 2025-05-18T18:36:02.488508776
        emailToken:
          type: string
          description: Token used for email verification.
          example: mPkKvTnNoieGt4h9ABneWb0YT9JL66KpgHlW9pRovbjD8M8YeM8Yc5zf8aPCJZjfbM4G_kjNgOUPMFEbCw-OWw
    UserProfileStatus:
      type: string
      description: |
        Represents the current status of the user's profile.
        - Created: The profile has been created successfully but is not yet fully active.
        - Active: The user profile is fully active and has full access to the platform.
        - Frozen: The account is temporarily disabled (e.g. due to payment or policy issues).
        Note: Status "New" is not currently supported in this context.
      enum:
      - New
      - Created
      - Active
      - Frozen
      example: Created
    User:
      type: object
      description: User information
      properties:
        id:
          type: string
          description: Unique identifier of the user.
          example: e967a977-6068-4355-99a9-bf387350b0dd
        firstName:
          type: string
          description: User's first name.
          example: John
        lastName:
          type: string
          description: User's last name.
          example: Doe
        fullName:
          type: string
          description: Full name of the user.
          example: John Doe
        company:
          type: string
          description: Company associated with the user.
          example: Company
        email:
          type: string
          description: User's email address.
          example: useremail@company.com
        country:
          $ref: "#/components/schemas/Country"
        status:
          $ref: "#/components/schemas/UserProfileStatus"
        creationTime:
          type: string
          description: Timestamp when the user profile was created (ISO8601 format).
          example: 2024-02-21T08:11:01.396302
        freeTrialPeriodStatus:
          $ref: "#/components/schemas/FreeTrialPeriodStatus"
        freeTrialPeriodFreezingStartTime:
          type: string
          description: Timestamp when free trial freezing started.
          example: 2024-02-24T08:12:01.840667
        freeTrialPeriodFreezingEndTime:
          type: string
          description: Timestamp when free trial freezing ended.
          example: 2024-02-25T08:12:01.840667
        paymentDetailsStatus:
          $ref: "#/components/schemas/PaymentDetailsStatus"
        authenticationMethod:
          $ref: "#/components/schemas/AuthenticationMethod"
        marketingConsentAcceptance:
          type: boolean
          description: Indicates if the user accepted marketing communications.
          example: false
        workspaceLimits:
          $ref: "#/components/schemas/WorkspaceLimits"
        marketplaceSubscriptions:
          type: array
          items:
            $ref: "#/components/schemas/MarketplaceSubscription"
        paymentSystem:
          type: string
          description: Payment system used by the user.
          example: vvc-payment-system
    FreeTrialPeriodStatus:
      type: string
      description: |
        Indicates the status of the user's free trial period:
        - NOT_STARTED: The trial has not yet begun.
        - ACTIVE: The user is currently in the trial period.
        - FREEZING: The trial is temporarily paused.
        - EXPIRED: The trial has ended.
        - LIFTED: The trial period has been overridden or resumed.
      enum:
      - NOT_STARTED
      - ACTIVE
      - FREEZING
      - EXPIRED
      - LIFTED
    PaymentDetailsStatus:
      type: string
      description: |
        Describes the current state of the user's payment details:
        - NONE: No billing details have been provided.
        - VALID: The user has submitted valid billing details.
      enum:
      - NONE
      - VALID
    AuthenticationMethod:
      type: string
      description: |
        The method used to authenticate the user:
        - CREDENTIALS: Standard email/password login.
        - GOOGLE: Login via Google account.
        - GITHUB: Login via GitHub account.
      enum:
      - CREDENTIALS
      - GOOGLE
      - GITHUB
    WorkspaceLimits:
      type: object
      description: Workspace limits
      properties:
        rcCount:
          type: integer
        paygCount:
          type: integer
        byocCount:
          type: integer
    MarketplaceSubscription:
      type: object
      description: |
        Describes a subscription acquired via a cloud marketplace such as AWS, Azure, or GCP.
        Includes metadata such as account, product, user, and customer identifiers, status,
        and timestamps of creation and deletion.
      properties:
        id:
          type: string
          maxLength: 36
          minLength: 1
        provider:
          $ref: "#/components/schemas/MarketplaceSubscriptionProvider"
        accountId:
          type: string
          maxLength: 256
          minLength: 1
        userId:
          type: string
          maxLength: 256
          minLength: 1
        customerId:
          type: string
          maxLength: 256
          minLength: 1
        productId:
          type: string
          maxLength: 256
          minLength: 1
        status:
          type: string
          enum:
          - ACTIVE
          - DELETED
        createdAt:
          type: string
        deletedAt:
          type: string
    MarketplaceSubscriptionProvider:
      type: string
      description: |
        Specifies the cloud provider through which the subscription was obtained:
        - AWS: Amazon Web Services Marketplace
        - AZURE: Microsoft Azure Marketplace
        - GCP: Google Cloud Platform Marketplace
      enum:
      - AWS
      - AZURE
      - GCP
    AutoResourceSetting:
      type: object
