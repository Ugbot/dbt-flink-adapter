[pytest]
filterwarnings =
    ignore:.*"soft_unicode" has been renamed to "soft_str"*:DeprecationWarning
    ignore:unclosed file .*:ResourceWarning
env_files =
    test.env
testpaths =
    tests/unit
    tests/integration
    tests/functional
    tests/adapters
    tests/sqlgateway
markers =
    fluss: Fluss integration tests (require Fluss cluster)
    integration: Tests requiring a live Flink SQL Gateway
    cdc: CDC integration tests (require CDC_TESTS=1)
    e2e: End-to-end pipeline tests (require E2E_TESTS=1)
    ververica: Ververica Cloud tests (require credentials)
addopts = -m "not integration and not cdc and not e2e and not ververica and not fluss"
